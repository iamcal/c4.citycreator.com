<VirtualHost *:443>
	ServerName citycreator.com
	ServerAlias www.citycreator.com
	DocumentRoot /var/www/html/citycreator.com/www

	RewriteEngine on
	RewriteCond %{HTTP_HOST} !^citycreator\.com$ [NC]
	RewriteRule ^/?(.*)$ https://citycreator.com/$1 [L,R=permanent]

	SSLEngine on
	SSLCertificateFile /etc/letsencrypt/live/citycreator.com/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/citycreator.com/privkey.pem

	Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
