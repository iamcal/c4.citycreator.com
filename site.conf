<Directory /var/www/html/citycreator.com/www>

	php_admin_flag engine on
	php_admin_flag safe_mode off
        php_flag display_errors on
        php_value error_reporting 2039
        php_value magic_quotes_gpc 0
        php_value register_globals 0
        php_value magic_quotes_runtime 0
        php_value register_long_arrays on
	php_value short_open_tag 1

	Options -Includes -ExecCGI
	AllowOverride all
</Directory>

<VirtualHost *:80>
	ServerName citycreator.com
	ServerAlias www.citycreator.com

	DocumentRoot /var/www/html/citycreator.com/www

	#Redirect permanent / https://citycreator.com/
</VirtualHost>

Include /var/www/html/citycreator.com/ssl_www.conf
