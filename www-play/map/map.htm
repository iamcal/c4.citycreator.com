<html>
<head>
<title>Map</title>
<script>

var g_buildings = {};
var g_map = null;
var g_tiles = {};
var g_visible_buildings = [];

var g_tile_width = 68;
var g_tile_height = 35-1;
var g_map_size = 15;

var g_origin_x = 0;
var g_origin_y = 0;

var g_tile_rows = (2 * g_map_size) - 1;
var g_map_width = g_tile_width * g_map_size;
var g_map_height = (g_tile_height * g_map_size) + 1;
var g_map_size_half = Math.ceil(g_map_size / 2);

function init(){

	add_building(0, 0, 100);
	add_building(1, 0, 100);
	add_building(-1, 0, 100);
	add_building(0, 1, 100);
	add_building(0, -1, 100);

	draw_tiles();
	draw_arrows();
	draw_buildings();
}

function draw_tiles(){

	g_map = document.getElementById('map');
	g_map.style.position = 'relative';
	g_map.style.width = g_map_width + 'px';
	g_map.style.height = g_map_height + 'px';
	//g_map.style.backgroundColor = 'lime';

	for(var r=g_tile_rows-1; r>=0; r--){

		var y = g_map_height - (g_tile_height + 2);

		if (is_odd(r)){

			var r2 = (r-1)/2;
			y -= r2 * g_tile_height;
			y -= (g_tile_height-1) / 2;

		}else{
			var r2 = r/2;
			y -= r2 * g_tile_height;
			y+=1;
		}

		var count = (r+1 > g_tile_rows/2) ? g_tile_rows-r : r+1;

		for (i=1; i<=count; i++){

			var x = calc_x(i, count);

			var ms = (g_map_size-1);
			var rw = r/2;

			if (rw > ms/2){
				var tx = i+r-(g_map_size-1)
			}else{
				var tx = i;
			}

			var ty = (r-tx)+2;

			add_cell(x, y, tx, ty, r);
		}
	}
}

function add_cell(x, y, tx, ty, depth){

	var cell = document.createElement('div');
	cell.style.position = 'absolute';
	cell.style.left = x + 'px';
	cell.style.top = y + 'px';
	//cell.style.backgroundColor = 'pink';
	cell.style.backgroundImage = 'url(tile.gif)';
	cell.style.width = g_tile_width + 'px';
	cell.style.height = (g_tile_height+1) + 'px';
	//cell.style.filter = 'alpha(opacity=50)';
	//cell.style.opacity = '0.5';

	cell.pos_x = x;
	cell.pos_y = y;
	cell.depth = g_tile_rows - depth;

	var bx = tx + g_origin_x - g_map_size_half;
	var by = ty + g_origin_y - g_map_size_half;

	cell.style.textAlign = 'center';
	//cell.appendChild(document.createTextNode(bx+','+by));

	g_map.appendChild(cell);

	g_tiles[tx+'_'+ty] = cell;
}

function calc_x(i, c){

	// find position of leftmost in this row
	var space = (g_map_size - c) / 2;

	var x = Math.ceil(space * g_tile_width);

	return x + (i-1) * g_tile_width;
}

function add_building(x, y, type_id){

	var cell = document.createElement('div');
	cell.style.position = 'absolute';
	cell.style.left = '0px';
	cell.style.top = '0px';

	g_buildings[x+'_'+y] = {
		'x':x,
		'y':x,
		'type_id':type_id,
		'cell':cell
	};
}

function is_odd(x){
	return (x % 2 == 0)?0:1;
}

function draw_buildings(){

	//
	// dettach previous buildings
	//

	for (i in g_visible_buildings){

		dettach_building(g_visible_buildings[i]);
	}

	g_visible_buildings = [];


	//
	// attach new buildings
	//

	for (var tx=1; tx<=g_map_size; tx++){
	for (var ty=1; ty<=g_map_size; ty++){

		var bx = tx + g_origin_x - g_map_size_half;
		var by = ty + g_origin_y - g_map_size_half;

		var tile = g_tiles[tx+'_'+ty];
		var buil = g_buildings[bx+'_'+by];

		if (buil && buil['type_id']){

			// build something here

			var cell = buil['cell'];

			cell.style.left = tile.pos_x + 'px';
			cell.style.top  = (tile.pos_y-17) + 'px';
			cell.style.width = '68px';
			cell.style.height = '52px';
			cell.style.backgroundImage = 'url(b1.gif)';
			cell.style.zIndex = tile.depth+10;

			g_map.appendChild(cell);

			g_visible_buildings.push(cell);
		}
	}
	}

}

function dettach_building(cell){
	cell.parentNode.removeChild(cell);
}

function draw_arrows(){

	var sft = Math.max(0, (g_map_size-4)/4);
	var x_sft = Math.round(sft * g_tile_width);
	var y_sft = Math.round(sft * g_tile_height);

	var l = x_sft;
	var r = g_map_width - (g_tile_width + x_sft);

	var t = y_sft;
	var b = g_map_height - (g_tile_height + y_sft);

	add_arrow(l, t, 'tl');
	add_arrow(r, t, 'tr');

	add_arrow(l, b, 'bl');
	add_arrow(r, b, 'br');

	add_arrow(l-100, t, 'l');

}

function add_arrow(x, y, dir){

	var elm = document.createElement('div');
	elm.style.position = 'absolute';
	elm.style.left = x+'px';
	elm.style.top = y+'px';
	elm.style.width = g_tile_width+'px';
	elm.style.height = (g_tile_height+1)+'px';
	elm.style.backgroundImage = 'url(arrow_'+dir+'.gif)';
	elm.style.backgroundColor = 'pink';
	elm.style.cursor = 'pointer';

	var closure = function(){ var this_dir=dir; return function(){ move_map(this_dir); }; }();
	elm.onclick = closure;

	g_map.appendChild(elm);
}

function move_map(dir){

	if (dir == 'tl'){ g_origin_y++; }
	if (dir == 'br'){ g_origin_y--; }

	if (dir == 'tr'){ g_origin_x++; }
	if (dir == 'bl'){ g_origin_x--; }

	if (dir == 'l'){ g_origin_y++; g_origin_x--; }

	draw_buildings();
}


</script>
</head>
<body onload="init();">

<h1>Mapping Test</h1>

<div id="map">
</div>

</body>
</html>
