<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
	<head>
	<title>Yahoo! Maps Simple Example</title>
	<script src="dragdrop.js" type="text/javascript"></script>
	<script src="maps_api.js" type="text/javascript"></script>
	<script type="text/javascript" language="JavaScript">
	function StartYMap() {
		var map = new YMap(document.getElementById('map'));
		map.drawZoomAndCenter(37.4042,-122.0082,5);
	}
	window.onload = StartYMap;
	</script>
	</head>
	<body>
		<div id="map" style="width: 800px; height: 500px"></div>
	</body>
</html>
