<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
<title>Scrolling map</title>
<script type="text/javascript" language="JavaScript">

window.onload = function(){

	var map = new dragMap('map');
};

function dragMap(dst_name) {

	this.isOpera = (navigator.userAgent.indexOf('Opera') != -1);
	this.isIE = (!this.isOpera && navigator.userAgent.indexOf('MSIE') != -1)

	this.is_dragging = 0;
	this.tile_width = 200;
	this.tile_height = 200;
	this.tiles = new Array();


	// get the target area

	this.dst = document.getElementById(dst_name);

	this.port_width = parseInt(this.dst.style.width);
	this.port_height = parseInt(this.dst.style.height);

	this.dst.style.backgroundColor = '#eee';
	//this.dst.style.clip = 'rect(0,'+this.port_width+','+this.port_height+',0)';
	this.dst.style.overflow = 'hidden';


	// create the dragbase

	this.dragbase = this.createCanvas();
	this.dragbase.pos_x = 0;
	this.dragbase.pos_y = 0;
	//this.dragbase.style.backgroundColor = 'lime';


	// create enough tiles to fill the target area

	this.tiles_x = 2 + Math.ceil(this.port_width / this.tile_width);
	this.tiles_y = 2 + Math.ceil(this.port_height / this.tile_height);

	for(var y = 0; y<this.tiles_y; y++){
		for(var x = 0; x<this.tiles_x; x++){

			this.createTile(this.dragbase, x, y);
		}
	}


	// create the cover

	this.cover = this.createCanvas();
	//this.cover.style.backgroundColor = '#f33';

	var map = this;
	this.cover.onmousedown = function(e){ map.onDragStart(e); };
}

dragMap.prototype.createCanvas = function(){

	var elm = document.createElement('DIV');
	elm.style.position = 'absolute';
	elm.style.left = '0px';
	elm.style.top = '0px';
	elm.style.width = this.port_width+'px';
	elm.style.height = this.port_height+'px';

	this.dst.appendChild(elm);

	return elm;
}

dragMap.prototype.addText = function(elm, text){

	elm.appendChild(document.createTextNode(text));
}

dragMap.prototype.createTile = function(p, x, y){

	var elm = document.createElement('DIV');
	elm.style.position = 'absolute';
	elm.style.left = ((x-1) * this.tile_width) + 'px';
	elm.style.top = ((y-1) * this.tile_height) + 'px';
	elm.style.width = this.tile_width + 'px';
	elm.style.height = this.tile_height + 'px';
	elm.style.border = '1px solid pink';

	p.appendChild(elm);
	this.addText(elm, "node "+x+","+y);
}

dragMap.prototype.onDragStart = function(e){

	if (this.is_dragging) return;
	this.is_dragging = 1;

	this.old_pos = this.getXY(e);

	this.old_onmousemove = window.onmousemove;
	this.old_onmouseup = window.onmouseup;

	var map = this;

	window.onmousemove = function(e){ map.onDragMove(e) };
	window.onmouseup = function(e){ map.onDragEnd(e) };
}

dragMap.prototype.onDragEnd = function(e){

	this.is_dragging = 0;

	window.onmousemove = this.old_onmousemove;
	window.onmouseup = this.old_onmouseup;
}

dragMap.prototype.onDragMove = function(e){

	this.new_pos = this.getXY(e);

	var dx = this.new_pos['x'] - this.old_pos['x'];
	var dy = this.new_pos['y'] - this.old_pos['y'];

	this.scrollBy(dx, dy);

	this.old_pos = this.new_pos;
}

dragMap.prototype.getXY = function(e){

	var posx = 0;
	var posy = 0;

	if (!e) var e = window.event;

	if (e.pageX || e.pageY){

		posx = e.pageX;
		posy = e.pageY;

	}else if (e.clientX || e.clientY){

		posx = e.clientX;
		posy = e.clientY;

	}else if (e.clientX || e.clientY){

		posx = e.clientX;
		posy = e.clientY;

		if (this.isIE){

			posx += document.body.scrollLeft;
			posy += document.body.scrollTop;
		}
	}

	return {'x':posx, 'y':posy};
}

dragMap.prototype.scrollBy = function(x, y){

	this.dragbase.pos_x += x;
	this.dragbase.pos_y += y;

	this.dragbase.style.left = this.dragbase.pos_x + 'px';
	this.dragbase.style.top = this.dragbase.pos_y + 'px';
}

</script>
</head>
<body>

hello world<br />

	<div id="map" style="width: 800px; height: 500px; position: relative;"></div>

</body>
</html>
