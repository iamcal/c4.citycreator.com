<VirtualHost *:443>
	ServerName c4.citycreator.com
	ServerAlias castleford.citycreator.com
	DocumentRoot /var/www/html/c4.citycreator.com/www

	RewriteEngine on
	RewriteCond %{HTTP_HOST} !^c4\.citycreator\.com$ [NC]
	RewriteRule ^/?(.*)$ https://c4.citycreator.com/$1 [L,R=permanent]

	SSLEngine on
	SSLCertificateFile /etc/letsencrypt/live/c4.citycreator.com/cert.pem
	SSLCertificateChainFile /etc/letsencrypt/live/c4.citycreator.com/chain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/c4.citycreator.com/privkey.pem

	Include /etc/letsencrypt/options-ssl-apache.conf
</VirtualHost>
